<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 440" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgT" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f9f7ff"/></linearGradient>
    <linearGradient id="triF" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ede7f6"/><stop offset="1" stop-color="#d9ccf5"/></linearGradient>
    <filter id="shT" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5e35b1" flood-opacity="0.16"/></filter>
  </defs>
  <rect width="540" height="440" rx="18" fill="url(#bgT)"/>
  <rect x="22" y="22" width="40" height="5" rx="2.5" fill="#5e35b1"/>
  <text x="22" y="50" font-size="21" font-weight="800" fill="#1f2937">Magnification formula triangle</text>
  <polygon points="270,92 132,312 408,312" fill="url(#triF)" stroke="#5e35b1" stroke-width="3.5" stroke-linejoin="round" filter="url(#shT)"/>
  <line x1="201" y1="205" x2="339" y2="205" stroke="#5e35b1" stroke-width="3.5"/>
  <line x1="270" y1="205" x2="270" y2="312" stroke="#5e35b1" stroke-width="3.5"/>
  <g text-anchor="middle" fill="#311b92">
    <text x="270" y="168" font-size="19" font-weight="800">image size</text>
    <text x="203" y="270" font-size="16" font-weight="800">magnifi-</text>
    <text x="203" y="289" font-size="16" font-weight="800">cation</text>
    <text x="338" y="270" font-size="16" font-weight="800">real</text>
    <text x="338" y="289" font-size="16" font-weight="800">size</text>
  </g>
  <rect x="86" y="344" width="368" height="38" rx="11" fill="#f3effb" stroke="#c7b8ec" stroke-width="1.5"/>
  <text x="270" y="369" text-anchor="middle" font-size="16.5" font-weight="800" fill="#311b92">magnification = image size ÷ real size</text>
  <text x="270" y="406" text-anchor="middle" font-size="13" fill="#6b7280">Cover the quantity you want to find.</text>
</svg>
